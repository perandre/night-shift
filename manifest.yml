# Night Shift manifest
#
# This is the single source of truth for what tasks exist, what they do,
# what bundle they belong to, and what order they run in. Edit this file
# to add a task, rename one, change ordering, or move a task between bundles.
#
# Task ids match filenames in tasks/<id>.md (without the .md extension).
# Bundle ids match filenames in bundles/<id>.md.
#
# Mode values:
#   direct-to-main  — task commits straight to the default branch
#   pull-request    — task creates a feature branch and opens a PR
#
# Parallelism values (per bundle):
#   independent     — tasks can run in any order, no inter-task dependency
#   sequential      — tasks must run in declared order, with verification between
#
# stop_on_failure (per bundle): if true, abort the bundle when a task fails
# verification. Use for code-changing bundles where each task assumes a green baseline.
#
# Scope values (per task):
#   app             — (default) in a monorepo with `apps:` configured, the
#                     multi-runner dispatches one subagent per app. In single-app
#                     repos this behaves identically to `repo`.
#   repo            — always runs once per repo, even when `apps:` is set. Use
#                     for cross-cutting work (ADRs, repo-wide suggestions,
#                     secret scans) that shouldn't be duplicated per app.
#
# slug (per pull-request task): the short token used in branch names and PR
# titles — `night-shift/<slug>-YYYY-MM-DD` and `night-shift/<slug>: …`. This is
# the **single source of truth** for the slug; bundle docs and the post-create
# title-format check both consult this field. The task id (`find-security-issues`)
# must never appear in a branch or PR title — only the slug (`security`).
# Tasks in `direct-to-main` or issue-only modes omit `slug`.

bundles:
  plans:
    title: Build planned features
    description: Picks one pending phase from a docs/*-PLAN.md file and implements it.
    schedule_hint: nightly
    parallelism: independent
    stop_on_failure: false
  docs:
    title: Update documentation
    description: Refresh changelog, user guide, decision records, and suggestion list.
    schedule_hint: weekly
    parallelism: independent
    stop_on_failure: false
  code-fixes:
    title: Fix code quality issues
    description: Add tests, fix accessibility issues, complete missing translations, shrink lint baselines.
    schedule_hint: weekly
    parallelism: sequential
    stop_on_failure: true
  audits:
    title: Audit and propose PRs
    description: Find security, bug, SEO, performance, and known-vulnerable dependency issues. Open one PR per area.
    schedule_hint: weekly
    parallelism: independent
    stop_on_failure: false
  triage-ci:
    title: Triage CI failures on open Night Shift PRs
    description: Comments on each failed/cancelled check explaining whether it's caused by the PR's diff, and re-runs cancellations + clearly-unrelated flakes.
    schedule_hint: nightly
    parallelism: independent
    stop_on_failure: false
  shopify:
    title: Shopify-specific automation
    description: "Vendor-update cherry-picks (Horizon/Dawn/Skeleton releases) and pre-flight migration-risk audits. Opt-in for Shopify projects only — set `bundles: [shopify]` in CLAUDE.md Night Shift Config."
    schedule_hint: weekly
    parallelism: independent
    stop_on_failure: false

tasks:
  - id: build-planned-features
    title: Build planned features
    description: Picks the next pending phase from a docs/*-PLAN.md file and implements it on a feature branch.
    bundle: plans
    mode: pull-request
    slug: plan
    order: 1
    scope: app
    needs: [test, build]

  - id: work-on-issues
    title: Work on tagged issues
    description: Picks up GitHub Issues labeled "night-shift" and implements fixes/features as PRs.
    bundle: plans
    mode: pull-request
    slug: issue
    order: 2
    scope: repo
    needs: [test, build]

  - id: work-on-jira-issues
    title: Work on tagged Jira issues
    description: Picks up Jira issues labelled "night-shift" in the repo's configured Jira project and implements them as GitHub PRs.
    bundle: plans
    mode: pull-request
    slug: jira
    order: 3
    scope: repo
    needs: [test, build]

  - id: update-changelog
    title: Update changelog
    description: Adds entries for any user-facing changes since the last release.
    bundle: docs
    mode: pull-request
    slug: changelog
    order: 1
    scope: app

  - id: update-user-guide
    title: Update documentation
    description: Discovers and refreshes all project docs — user guides, READMEs, technical docs, concept docs, model descriptions, and more.
    bundle: docs
    mode: pull-request
    slug: docs
    order: 2
    scope: app

  - id: document-decisions
    title: Document decisions
    description: Captures architectural decisions visible in code and git history as ADRs.
    bundle: docs
    mode: pull-request
    slug: adr
    order: 3
    scope: repo

  - id: suggest-improvements
    title: Suggest improvements
    description: Analyzes the codebase for improvement ideas to pitch to stakeholders.
    bundle: docs
    mode: pull-request
    slug: suggestions
    order: 4
    scope: repo

  - id: add-tests
    title: Add tests
    description: Finds coverage gaps and adds up to 10 new tests in one PR, following project conventions.
    bundle: code-fixes
    mode: pull-request
    slug: tests
    order: 1
    scope: app
    needs: [test, build]

  - id: improve-accessibility
    title: Improve accessibility
    description: Audits key pages against WCAG 2.1 AA criteria (contrast, keyboard, ARIA, labels, focus, headings) and fixes all violations in one PR with regression tests.
    bundle: code-fixes
    mode: pull-request
    slug: a11y
    order: 2
    scope: app
    needs: [test, build]

  - id: translate-ui
    title: Translate UI
    description: Finds all hardcoded UI strings and extracts them to translation files in one PR.
    bundle: code-fixes
    mode: pull-request
    slug: i18n
    order: 3
    scope: app
    needs: [test, build]

  - id: lint-baseline-shrink
    title: Shrink lint baseline
    description: Picks one entry from the project's static-analysis baseline (PHPStan, Psalm, ESLint, mypy, RuboCop, etc.), fixes the underlying issue, and removes the suppression.
    bundle: code-fixes
    mode: pull-request
    slug: lint-baseline
    order: 4
    scope: app
    needs: [test, build]

  - id: find-security-issues
    title: Find security issues
    description: Scans for OWASP Top 10 patterns and opens a PR for each issue found.
    bundle: audits
    mode: pull-request
    slug: security
    order: 1
    scope: app
    needs: [test, build]

  - id: find-bugs
    title: Find bugs
    description: Looks for subtle bugs, race conditions, and edge cases. Opens a PR per bug.
    bundle: audits
    mode: pull-request
    slug: bug
    order: 2
    scope: app
    needs: [test, build]

  - id: improve-seo
    title: Improve SEO
    description: Reviews page metadata, Open Graph tags, structured data, and robots directives.
    bundle: audits
    mode: pull-request
    slug: seo
    order: 3
    scope: app
    needs: [test, build]

  - id: improve-performance
    title: Improve performance
    description: Reviews bundle size, image optimization, render-blocking resources, and database query patterns.
    bundle: audits
    mode: pull-request
    slug: perf
    order: 4
    scope: app
    needs: [test, build]

  - id: dep-audit
    title: Audit dependencies
    description: Runs the ecosystem's dependency audit (composer audit, npm audit, pip-audit, cargo audit, bundle audit, govulncheck) and opens a PR pinning known-vulnerable transitive deps to safe versions.
    bundle: audits
    mode: pull-request
    slug: deps
    order: 5
    scope: app
    needs: [test, build]

  - id: triage-ci-failures
    title: Triage CI failures
    description: For every open `night-shift` PR, comments on each failed or cancelled check explaining whether the failure is caused by the PR's diff, and re-runs cancellations + unrelated flakes. Does not open new PRs.
    bundle: triage-ci
    mode: direct-to-main
    order: 1
    scope: repo

  - id: shopify-cherry-pick-vendor-update
    title: Cherry-pick vendor theme update (Shopify)
    description: When a vendor-update issue is open (Horizon/Dawn/Skeleton released a newer version than .vendor-baseline), downloads the upstream tree, classifies changes via the project's diff_vendor_update.py, and opens one PR per concern (perf, schema, components, i18n, settings, meta).
    bundle: shopify
    mode: pull-request
    slug: vendor-update
    order: 1
    scope: repo
    needs: [theme-check, test]

  - id: shopify-audit-migration-risk
    title: Audit migration risk (Shopify)
    description: Runs the project's audit_migration_risk.py to surface installed apps that fire side effects on bulk imports (Klaviyo, Judge.me, etc.). Opens an issue ONLY when known-risky apps are detected AND recent commits suggest a migration is being prepared. Never modifies code.
    bundle: shopify
    mode: direct-to-main
    order: 2
    scope: repo
