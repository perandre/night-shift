<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Night Shift — wall dashboard</title>
<meta name="description" content="Wall-display dashboard for Night Shift runs. Hours worked last night and in total, per project." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230f0a23'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%235dc6c0' stroke-width='1.5'/%3E%3Cpath d='M16 9 v7 l5 3' fill='none' stroke='%23e87964' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E" />
<style>
  :root {
    --bg:        #0f0a23;
    --bg-2:      #170f33;
    --bg-3:      #1d143f;
    --ink:       #f3ece1;
    --ink-mute:  #b9b1c8;
    --ink-dim:   #786f8a;
    --line:      rgba(243, 236, 225, 0.08);
    --line-2:    rgba(243, 236, 225, 0.16);
    --coral:     #e87964;
    --teal:      #5dc6c0;
    --sun:       #d9b274;
    --plum:      #6b3a73;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(107,58,115,0.35), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(93,198,192,0.18), transparent 60%),
      var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100%;
    overflow-x: hidden;
  }

  /* Subtle starfield */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(243,236,225,0.5), transparent 50%),
      radial-gradient(1px 1px at 70% 80%, rgba(243,236,225,0.35), transparent 50%),
      radial-gradient(1px 1px at 40% 70%, rgba(243,236,225,0.45), transparent 50%),
      radial-gradient(1px 1px at 85% 20%, rgba(243,236,225,0.4), transparent 50%),
      radial-gradient(1px 1px at 10% 85%, rgba(243,236,225,0.5), transparent 50%);
    opacity: 0.4;
  }

  .wrap {
    position: relative;
    max-width: 1800px;
    margin: 0 auto;
    padding: clamp(24px, 3vw, 56px);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding-bottom: clamp(20px, 2vw, 32px);
    border-bottom: 1px solid var(--line);
    margin-bottom: clamp(24px, 3vw, 48px);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    font-size: clamp(14px, 1.1vw, 18px);
  }
  .brand .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--coral);
    box-shadow: 0 0 18px var(--coral);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.55; transform: scale(0.85); }
  }
  .brand .sep {
    color: var(--ink-dim);
    font-weight: 400;
  }
  .brand .title { color: var(--ink); }
  .brand .sub   { color: var(--ink-mute); font-weight: 400; letter-spacing: 0.12em; }

  .meta {
    display: flex;
    align-items: center;
    gap: 18px;
    color: var(--ink-mute);
    font-variant-numeric: tabular-nums;
    font-size: clamp(13px, 1vw, 16px);
  }
  .meta .clock {
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .meta .refresh {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border: 1px solid var(--line-2);
    border-radius: 999px;
  }
  .meta .refresh::before {
    content: "";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 12px var(--teal);
  }
  .meta .refresh.preview::before {
    background: var(--sun);
    box-shadow: 0 0 12px var(--sun);
  }
  .meta .refresh.error::before {
    background: var(--coral);
    box-shadow: 0 0 12px var(--coral);
  }

  /* Headline */
  .headline {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(16px, 1.5vw, 32px);
    margin-bottom: clamp(28px, 3vw, 56px);
  }
  .kpi {
    padding: clamp(20px, 1.8vw, 32px);
    background: linear-gradient(180deg, var(--bg-2), var(--bg-3));
    border: 1px solid var(--line);
    border-radius: 18px;
  }
  .kpi .label {
    font-size: clamp(11px, 0.85vw, 13px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 12px;
  }
  .kpi .value {
    font-size: clamp(36px, 5vw, 80px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .kpi .value .unit {
    font-size: 0.4em;
    color: var(--ink-mute);
    margin-left: 0.2em;
    font-weight: 500;
    letter-spacing: 0;
  }
  .kpi.last-night .value { color: var(--coral); }
  .kpi.total      .value { color: var(--teal); }
  .kpi.projects   .value { color: var(--sun); }

  /* Table */
  .table-card {
    background: linear-gradient(180deg, var(--bg-2), var(--bg-3));
    border: 1px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  thead th {
    text-align: left;
    padding: clamp(16px, 1.3vw, 22px) clamp(20px, 2vw, 32px);
    font-size: clamp(11px, 0.85vw, 14px);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-mute);
    border-bottom: 1px solid var(--line-2);
    background: rgba(255,255,255,0.015);
  }
  thead th.num {
    text-align: right;
    /* override the .num cell sizing — header stays small */
    font-size: clamp(11px, 0.85vw, 14px);
    font-weight: 600;
    letter-spacing: 0.22em;
    color: var(--ink-mute);
  }
  tbody td {
    padding: clamp(20px, 2vw, 36px) clamp(20px, 2vw, 32px);
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(255,255,255,0.02); }

  .repo {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }
  .repo .swatch {
    width: 10px; height: 40px;
    border-radius: 3px;
    flex: none;
  }
  .repo-name {
    min-width: 0;
    overflow: hidden;
  }
  .repo-name .owner {
    display: block;
    color: var(--ink-mute);
    font-size: clamp(12px, 0.95vw, 16px);
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }
  .repo-name .name {
    display: block;
    font-size: clamp(22px, 2.2vw, 40px);
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: clamp(40px, 5vw, 84px);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .num .unit {
    font-size: 0.35em;
    color: var(--ink-mute);
    margin-left: 0.18em;
    font-weight: 500;
    letter-spacing: 0;
  }
  .num.last-night { color: var(--coral); }
  .num.total      { color: var(--teal); }
  .num.zero       { color: var(--ink-dim); }

  /* Footer */
  footer {
    margin-top: clamp(24px, 3vw, 40px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    color: var(--ink-dim);
    font-size: clamp(12px, 0.9vw, 14px);
  }
  footer a { color: var(--ink-mute); text-decoration: none; border-bottom: 1px dotted var(--line-2); }
  footer a:hover { color: var(--ink); }

  /* Empty state */
  .empty {
    padding: 80px 24px;
    text-align: center;
    color: var(--ink-mute);
  }
  .empty h2 {
    font-size: clamp(28px, 3vw, 48px);
    margin: 0 0 12px;
    color: var(--ink);
  }
  .empty p { font-size: clamp(14px, 1vw, 18px); max-width: 560px; margin: 0 auto; }

  /* Responsive: stack on small screens */
  @media (max-width: 720px) {
    .headline { grid-template-columns: 1fr; }
    thead { display: none; }
    tbody tr { display: grid; grid-template-columns: 1fr; gap: 8px; padding: 20px; border-bottom: 1px solid var(--line); }
    tbody td { padding: 0; border: none; }
    .num { text-align: left; font-size: 56px; }
    .num::before {
      content: attr(data-label);
      display: block;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-mute);
      font-weight: 600;
      margin-bottom: 4px;
    }
  }

  /* Wall-screen mode: ultra-large numbers when ?wall=1 or screen is huge */
  @media (min-width: 2200px) {
    .num     { font-size: 120px; }
    .repo-name .name { font-size: 56px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <span class="title">Night Shift</span>
        <span class="sep">/</span>
        <span class="sub">Wall Dashboard</span>
      </div>
      <div class="meta">
        <span class="clock" id="clock"></span>
        <span class="refresh" id="refresh" title="Data source"><span id="mode-label">loading…</span> · <span id="updated">just now</span></span>
      </div>
    </header>

    <section class="headline" id="headline">
      <div class="kpi last-night">
        <div class="label">Last Night · Total</div>
        <div class="value"><span id="kpi-last">—</span></div>
      </div>
      <div class="kpi total">
        <div class="label">All Time · Total</div>
        <div class="value"><span id="kpi-total">—</span></div>
      </div>
      <div class="kpi projects">
        <div class="label">Projects · Active / Total</div>
        <div class="value"><span id="kpi-projects">—</span></div>
      </div>
    </section>

    <div class="table-card" id="table-card">
      <table>
        <thead>
          <tr>
            <th>Project</th>
            <th class="num">Last Night</th>
            <th class="num">Total</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="3" class="empty"><h2>Loading…</h2></td></tr>
        </tbody>
      </table>
    </div>

    <footer>
      <span>Source: <code>dashboard/runs.jsonl</code> · One event per Night Shift run</span>
      <span>Auto-refresh every 60s · <a href="../">Back to Night Shift</a></span>
    </footer>
  </div>

<script>
(function () {
  'use strict';

  // ----- Config ---------------------------------------------------------
  const DATA_URL = './runs.jsonl';
  const REFRESH_MS = 60_000;
  const SWATCH_COLORS = ['#e87964','#5dc6c0','#d9b274','#6b3a73','#a8b864','#c87cb0','#7cb7e8','#e8a464'];

  // ----- Helpers --------------------------------------------------------
  function fmtClock(d) {
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    return `${h}:${m}`;
  }

  // Format seconds as e.g. "2.5h" or "47m" — wall-display friendly.
  function fmtHours(seconds) {
    if (!seconds || seconds <= 0) return { value: '0', unit: 'h' };
    const hours = seconds / 3600;
    if (hours < 1) {
      const mins = Math.round(seconds / 60);
      return { value: String(mins), unit: 'm' };
    }
    if (hours < 10) return { value: hours.toFixed(1), unit: 'h' };
    return { value: String(Math.round(hours)), unit: 'h' };
  }

  function calendarDateUTC(isoTimestamp) {
    return isoTimestamp.slice(0, 10); // YYYY-MM-DD
  }

  function colorFor(name, idx) {
    return SWATCH_COLORS[idx % SWATCH_COLORS.length];
  }

  function timeAgo(seconds) {
    if (seconds < 5)   return 'just now';
    if (seconds < 60)  return `${Math.floor(seconds)}s ago`;
    if (seconds < 3600) return `${Math.floor(seconds/60)}m ago`;
    return `${Math.floor(seconds/3600)}h ago`;
  }

  // ----- Data loading ---------------------------------------------------
  function parseJsonl(text) {
    const events = [];
    for (const line of text.split(/\r?\n/)) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      try {
        const ev = JSON.parse(trimmed);
        if (ev && typeof ev.repo === 'string' && typeof ev.duration_seconds === 'number' && typeof ev.timestamp === 'string') {
          events.push(ev);
        }
      } catch (_) { /* skip malformed line */ }
    }
    return events;
  }

  function loadSeed() {
    const el = document.getElementById('seed-data');
    return el ? parseJsonl(el.textContent) : [];
  }

  async function fetchEvents() {
    const url = `${DATA_URL}?t=${Date.now()}`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return parseJsonl(await res.text());
  }

  // ----- Aggregation ----------------------------------------------------
  function aggregate(events) {
    // "Last night" = the most recent UTC calendar date in the data, globally.
    // A project that didn't run on that date shows 0 — that's the point of the
    // wall display: spot the quiet projects at a glance.
    const byRepo = new Map();
    let globalLatestDate = null;
    for (const ev of events) {
      const repo = ev.repo;
      const date = calendarDateUTC(ev.timestamp);
      const dur = ev.duration_seconds || 0;
      if (!globalLatestDate || date > globalLatestDate) globalLatestDate = date;
      if (!byRepo.has(repo)) byRepo.set(repo, { repo, total: 0, byDate: new Map() });
      const r = byRepo.get(repo);
      r.total += dur;
      r.byDate.set(date, (r.byDate.get(date) || 0) + dur);
    }
    const rows = [];
    for (const r of byRepo.values()) {
      const lastNight = globalLatestDate ? (r.byDate.get(globalLatestDate) || 0) : 0;
      rows.push({ repo: r.repo, total: r.total, lastNight });
    }
    // Sort by last-night desc (active projects first), then total desc, then name.
    rows.sort((a, b) =>
      (b.lastNight - a.lastNight)
      || (b.total - a.total)
      || a.repo.localeCompare(b.repo));
    return { rows, latestDate: globalLatestDate };
  }

  // ----- Rendering ------------------------------------------------------
  function renderRows(rows) {
    const tbody = document.getElementById('rows');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty"><h2>No runs yet</h2><p>Once Night Shift posts its first run, this dashboard will light up.</p></td></tr>';
      return;
    }
    tbody.innerHTML = rows.map((r, i) => {
      const ln = fmtHours(r.lastNight);
      const tot = fmtHours(r.total);
      const [owner, name] = r.repo.includes('/') ? r.repo.split('/', 2) : ['', r.repo];
      const swatchColor = colorFor(r.repo, i);
      const lnClass = r.lastNight > 0 ? 'last-night' : 'zero';
      return `
        <tr>
          <td>
            <div class="repo">
              <div class="swatch" style="background:${swatchColor}"></div>
              <div class="repo-name">
                <span class="owner">${escapeHtml(owner || '')}${owner ? '/' : ''}</span>
                <span class="name">${escapeHtml(name)}</span>
              </div>
            </div>
          </td>
          <td class="num ${lnClass}" data-label="Last Night">${ln.value}<span class="unit">${ln.unit}</span></td>
          <td class="num total" data-label="Total">${tot.value}<span class="unit">${tot.unit}</span></td>
        </tr>`;
    }).join('');
  }

  function renderHeadline(rows, latestDate) {
    const lastNightTotal = rows.reduce((s, r) => s + r.lastNight, 0);
    const allTimeTotal   = rows.reduce((s, r) => s + r.total, 0);
    const activeProjects = rows.filter(r => r.lastNight > 0).length;

    const ln  = fmtHours(lastNightTotal);
    const at  = fmtHours(allTimeTotal);

    document.getElementById('kpi-last').innerHTML    = `${ln.value}<span class="unit">${ln.unit}</span>`;
    document.getElementById('kpi-total').innerHTML   = `${at.value}<span class="unit">${at.unit}</span>`;
    document.getElementById('kpi-projects').textContent = `${activeProjects}/${rows.length}`;

    // Update the "Last Night" KPI label to include the date — e.g. "Last Night · May 13"
    const lastLabel = document.querySelector('.kpi.last-night .label');
    if (lastLabel && latestDate) {
      const d = new Date(`${latestDate}T00:00:00Z`);
      const fmt = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      lastLabel.textContent = `Last Night · ${fmt}`;
    }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  // ----- Lifecycle ------------------------------------------------------
  let lastLoaded = null;
  let mode = 'preview'; // 'preview' | 'live' | 'error'

  function renderEvents(events) {
    const { rows, latestDate } = aggregate(events);
    renderRows(rows);
    renderHeadline(rows, latestDate);
  }

  function setMode(next) {
    mode = next;
    const refresh = document.getElementById('refresh');
    const label = document.getElementById('mode-label');
    refresh.classList.remove('preview', 'error');
    if (next === 'live')    { label.textContent = 'live'; refresh.title = 'Reading dashboard/runs.jsonl over HTTP'; }
    if (next === 'preview') { label.textContent = 'preview'; refresh.classList.add('preview'); refresh.title = 'Showing inline seed data — open via http(s):// to read the live runs.jsonl file'; }
    if (next === 'error')   { label.textContent = 'error'; refresh.classList.add('error'); refresh.title = 'Could not load runs.jsonl'; }
  }

  async function refresh() {
    // Step 1: render the inline seed immediately (works from file://).
    const seed = loadSeed();
    if (seed.length && !lastLoaded) {
      renderEvents(seed);
      lastLoaded = new Date();
      setMode('preview');
    }
    // Step 2: try to fetch the live JSONL — supersedes the seed on success.
    try {
      const events = await fetchEvents();
      renderEvents(events);
      lastLoaded = new Date();
      setMode('live');
    } catch (err) {
      if (!seed.length) {
        const tbody = document.getElementById('rows');
        tbody.innerHTML = `<tr><td colspan="3" class="empty"><h2>Couldn't load runs</h2><p>${escapeHtml(String(err.message || err))}</p><p style="margin-top:18px;font-size:0.85em">Open via HTTP — from this folder run <code>python3 -m http.server</code> and visit <code>http://localhost:8000/dashboard/</code>, or deploy to GitHub Pages.</p></td></tr>`;
        setMode('error');
      }
      // Else: keep showing the seed.
    }
  }

  function tickClock() {
    document.getElementById('clock').textContent = fmtClock(new Date());
    if (lastLoaded) {
      const secs = (Date.now() - lastLoaded.getTime()) / 1000;
      document.getElementById('updated').textContent = timeAgo(secs);
    }
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
  tickClock();
  setInterval(tickClock, 1000);
})();
</script>
</body>
